services:
  - type: web
    name: car-plate-detector
    env: python
    plan: free
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python create_mock_model.py
    startCommand: >
      uvicorn src.api_service:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PATH
        value: mock_model
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "10000"
    maxInstances: 1
    numInstances: 1
