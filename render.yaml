services:
  - type: web
    name: car-plate-detector
    env: python
    plan: free
    pythonVersion: 3.11
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt
    startCommand: >
      gunicorn app:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    maxInstances: 1
    numInstances: 1
